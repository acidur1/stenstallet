server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Logs to stdout/stderr (already nginx default in this image)
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript text/xml
        application/javascript application/json application/xml
        application/manifest+json image/svg+xml;

    # Service worker — must always be fresh so updates propagate
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        try_files $uri =404;
    }

    # Web manifest / icons — short cache
    location = /manifest.json {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # index.html — never cache, so deploys are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    # Vite hashed assets — immutable, long cache
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
